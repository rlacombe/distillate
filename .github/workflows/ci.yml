name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
      - name: Install ruff
        run: uv tool install ruff
      - name: Lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install -e . pytest pytest-timeout
      - name: Run tests
        run: uv run pytest tests/ -m "not slow" --timeout=30 -q

  desktop-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install desktop dependencies
        # --ignore-scripts skips the macOS-only patch-electron step and the
        # node-pty native rebuild; unit tests mock both and don't need them.
        run: npm ci --ignore-scripts
      - name: Run desktop unit tests
        run: npm test
