<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src ws://127.0.0.1:* http://127.0.0.1:*; style-src 'self' 'unsafe-inline'; frame-src blob:;">
  <title>Distillate</title>
  <link rel="stylesheet" href="../node_modules/highlight.js/styles/tokyo-night-dark.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <span class="titlebar-text">Distillate</span>
    <div id="tab-bar" class="hidden">
      <button class="tab active" data-tab="lab">Lab</button>
      <button class="tab" data-tab="notebook">Notebook</button>
      <button class="tab" data-tab="chat">Chat</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="settings-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <label for="setting-api-key">Anthropic API Key</label>
          <input type="password" id="setting-api-key" placeholder="sk-ant-..." autocomplete="off">
          <p class="setting-hint">Required. Get one at <a href="#" id="console-link">console.anthropic.com</a></p>
        </div>
        <div class="setting-group">
          <label for="setting-auth-token">Distillate Cloud Token</label>
          <input type="password" id="setting-auth-token" placeholder="Optional" autocomplete="off">
          <p class="setting-hint">For cloud sync. Leave blank to skip.</p>
        </div>
        <div class="setting-actions">
          <button id="settings-save" class="btn-primary">Save</button>
          <span id="settings-status" class="setting-status"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Lab tab (experiment timeline) -->
  <div id="lab-container" class="tab-content hidden">
    <div id="lab-stats" class="lab-stats-bar"></div>
    <div id="lab-timeline"></div>
  </div>

  <!-- Notebook tab -->
  <div id="notebook-container" class="tab-content hidden">
    <iframe id="notebook-frame" sandbox="allow-scripts" style="width:100%;height:100%;border:none;background:#0d1117;"></iframe>
  </div>

  <!-- Chat tab (existing) -->
  <div id="chat-container" class="tab-content">
    <div id="welcome">
      <div class="welcome-header">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="15.5" fill="#6366f1"/>
          <g fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
            <polyline points="5,11 10,15 5,19"/>
          </g>
          <path d="M11.6,20 L17.1,20 L14.6,24 A2.2,2.2 0 0,1 10.6,22 Z" fill="white" fill-opacity="0.4"/>
          <g fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="10.6" y1="22" x2="19.6" y2="7"/>
            <line x1="14.6" y1="24" x2="23.6" y2="9"/>
            <path d="M10.6,22 A2.2,2.2 0,0,0 14.6,24"/>
            <line x1="18.1" y1="6" x2="25.1" y2="10"/>
          </g>
        </svg>
        <h1>Distillate</h1>
      </div>

      <div class="welcome-banner">
        <div class="banner-line">
          <span class="banner-dashes">&#x2500;&#x2500;&#x2500;</span>
          <span class="banner-flask">&#x2697;&#xFE0F;</span>
          <span class="banner-name">Nicolas</span>
          <span class="banner-dashes-tail"></span>
        </div>
        <div class="banner-body">
          <p class="banner-tagline">Your research alchemist.</p>
          <p id="welcome-stats" class="banner-stats"></p>
        </div>
        <div class="banner-footer"></div>
      </div>

      <div class="suggestions">
        <button class="suggestion" data-text="What's in my queue?">What's in my queue?</button>
        <button class="suggestion" data-text="Summarize my last read">Summarize my last read</button>
        <button class="suggestion" data-text="What's trending in AI?">What's trending in AI?</button>
      </div>
    </div>

    <div id="messages"></div>
  </div>

  <div id="input-area">
    <div id="status-bar">
      <span id="status-dot" class="dot disconnected"></span>
      <span id="status-text">Connecting...</span>
    </div>
    <form id="input-form">
      <textarea id="input" placeholder="Ask Nicolas anything..." rows="1"
                autofocus autocomplete="off"></textarea>
      <button type="submit" id="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script src="../node_modules/marked/lib/marked.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
